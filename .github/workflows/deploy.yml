name: Deploy to Windows Server

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        working-directory: SanivorOffers
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install Node dependencies and build assets
        working-directory: SanivorOffers
        run: |
          npm install
          npm run build

      - name: Copy app files to C:\app
        run: |
          robocopy SanivorOffers C:\app /E /XD .git node_modules /XF .env
          exit 0

      - name: Run migrations
        working-directory: C:\app
        run: php artisan migrate --force

      - name: Restart app
        working-directory: C:\app
        run: |
          Stop-Process -Name "php" -Force -ErrorAction SilentlyContinue
          Start-Process -NoNewWindow php -ArgumentList "artisan serve --host=0.0.0.0 --port=8000"
