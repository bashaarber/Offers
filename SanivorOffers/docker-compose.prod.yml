# Place this file on the Windows server at C:\app\docker-compose.prod.yml
# Set these environment variables on the server before first run:
#   $Env:APP_KEY = "base64:..."
#   $Env:DB_PASSWORD = "your-strong-password"
# Image is built locally by the self-hosted runner — no registry needed.

version: '3.8'

services:
  app:
    image: sanivor-offers:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: sanivoroffers
      DB_USERNAME: sanivor
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      SESSION_DRIVER: file
      CACHE_DRIVER: file
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "false"
    volumes:
      - C:\app\storage:/app/storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sanivor

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sanivoroffers
      POSTGRES_USER: sanivor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanivor -d sanivoroffers"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sanivor

networks:
  sanivor:
    driver: bridge

volumes:
  pgdata:
