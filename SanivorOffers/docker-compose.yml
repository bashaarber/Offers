version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: sanivoroffers
      DB_USERNAME: sanivor
      DB_PASSWORD: password
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      SESSION_DRIVER: file
      CACHE_DRIVER: file
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sanivor

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sanivoroffers
      POSTGRES_USER: sanivor
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanivor -d sanivoroffers"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sanivor

networks:
  sanivor:
    driver: bridge

volumes:
  pgdata:
    name: sanivoroffers_pgdata
