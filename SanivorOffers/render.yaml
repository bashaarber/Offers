# Web service uses Dockerfile CMD (migrations, cache, php artisan serve with PORT).
# Do not set dockerCommand here — it overrides CMD and skips migrations on Render.
services:
  - type: web
    name: sanivor-offers
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: sanivor-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      # One-time full JSON import (truncates catalog). Default off on production — see DatabaseSeeder.
      - key: RUN_JSON_IMPORT
        value: "false"
      # Only if migrate fails on broken enum state (local/recovery). Never true in normal production.
      - key: CLEANUP_PG_ENUMS
        value: "false"
    healthCheckPath: /

databases:
  - name: sanivor-db
    plan: free
    databaseName: sanivor
    user: sanivor_user
